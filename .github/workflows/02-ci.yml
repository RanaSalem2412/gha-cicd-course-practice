# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      - "Dockerfile"
  schedule:
    - cron: '0 * * * *'    
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}

    #env:
      #PYTHON_VERSION: ${{ secrets.PYTHON_VERSION }}

    strategy:
      matrix:
        python-version: ["3.11", "3.12"] 
        os: [ubuntu-latest, macos-latest] 



    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # lint
      - name: Install Ruff 
        run: |
          python -m pip install --upgrade pip
          pip install ruff 

      - name: Lint with Ruff
        run: | 
          ruff check .     



      # Scan the project filesystem
      - name: Trivy Filesystem Scan 
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL

      # Scan Dockerfile and other IaC configurations
      - name: Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@master  
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          exit-code: '1'
          severity: CRITICAL
 

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      # build artifact and scan it and upload

      - name: Build Application Artifact
        run: |
          mkdir build

          cp -r app build/
          cp -r tests build/
          cp Dockerfile build/

          zip -r app-artifact.zip build

      - name: Trivy Scan Artifact
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app-artifact.zip
          format: table
          exit-code: '1'
          severity: CRITICAL 

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app-artifact.zip 

      # build docker image and scan it and upload

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -t myapp:${{ github.sha }} .  

      - name: Trivy Image Scan
        if: matrix.os == 'ubuntu-latest'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL


      - name: Save Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker save myapp:${{ github.sha }} -o myapp.tar   

      - name: Upload Docker Image Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: myapp.tar       




      - name: Check Time, List Files and Verify Python
        run: |
          echo "=== Checking Runner System Time (UTC) ==="
          date

          echo "=== Checking Python Version ==="
          python --version

          echo "=== Listing Repository Files ==="
          ls -la





          
